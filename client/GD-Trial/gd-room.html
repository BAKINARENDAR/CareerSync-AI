<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerSync AI | Group Discussion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Inter", sans-serif; }
        body { background: #191b2a; color: white; height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        
        header { position: absolute; top: 15px; left: 15px; z-index: 10; }
        .logo { font-size: 20px; font-weight: 600; color: #fff; }
        .grad { background: linear-gradient(90deg, #5ee7ff, #7bb7ff, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #roomCodeDisplay { position: absolute; top: 15px; right: 15px; color: #898a9e; font-weight: 600; font-size: 14px; }

        .topic-container { margin-top: 60px; background: rgba(38, 53, 86, 0.4); border: 1px solid rgba(94, 231, 255, 0.3); border-radius: 12px; padding: 15px; width: 90%; max-width: 700px; text-align: center; }
        .topic-text { font-size: 16px; font-weight: 600; line-height: 1.4; color: #fff; }
        .timer-display { font-size: 48px; font-weight: 700; color: #5ee7ff; text-shadow: 0 0 15px rgba(94, 231, 255, 0.6); margin: 10px 0; }
        
        .start-session-btn { background: #5ee7ff; color: #191b2a; padding: 10px 24px; border-radius: 8px; font-weight: 700; font-size: 15px; border: none; cursor: pointer; margin-bottom: 15px; transition: 0.3s; }
        .start-session-btn:hover { box-shadow: 0 0 15px rgba(94, 231, 255, 0.6); transform: scale(1.05); }

        .content-grid { display: flex; flex-direction: column; gap: 15px; width: 90%; max-width: 700px; flex: 1; margin-bottom: 90px; }
        .box { background: rgba(25, 27, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 15px; overflow-y: auto; scrollbar-width: none; flex: 1; display: flex; flex-direction: column; }
        .box::-webkit-scrollbar { display: none; }
        .box-title { color: #898a9e; font-size: 12px; margin-bottom: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0;}

        #participantList, #transcriptBody { flex: 1; overflow-y: auto; }
        .participant-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        
        .status-tags { display: flex; gap: 8px; align-items: center; }
        .speaking-tag { color: #191b2a; font-weight: 700; font-size: 10px; display: none; background: #5ee7ff; padding: 3px 6px; border-radius: 4px; box-shadow: 0 0 8px #5ee7ff; }
        .hand-tag { font-size: 16px; display: none; } /* Kept simple so it stays visible if in queue */

        .chat-msg { margin-bottom: 10px; font-size: 14px; line-height: 1.4; background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 8px; border-left: 3px solid #5ee7ff;}
        .chat-name { color: #5ee7ff; font-weight: 700; margin-right: 5px; }

        .bottom-dock { position: fixed; bottom: 20px; background: rgba(38, 53, 86, 0.95); backdrop-filter: blur(10px); padding: 10px 25px; border-radius: 40px; display: flex; gap: 20px; align-items: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; }
        
        .dock-btn { width: 50px; height: 50px; border-radius: 50%; border: none; display: flex; justify-content: center; align-items: center; font-size: 20px; transition: 0.3s; opacity: 0.5; cursor: not-allowed; }
        .dock-btn.active { opacity: 1; cursor: pointer; }
        
        /* Mic states */
        .mute-btn { background: transparent; color: #5ee7ff; border: 2px solid #5ee7ff; }
        .mute-btn.is-muted { background: #ef4743; color: white; border-color: #ef4743; }
        
        .hand-btn { background: transparent; color: #ffcc00; border: 2px solid #ffcc00; }
        .hand-btn.active { opacity: 1; cursor: pointer; }
        
        .end-btn { background: #ef4743; color: white; opacity: 1; cursor: pointer; }

        @media (min-width: 768px) {
            .content-grid { flex-direction: row; max-width: 1200px; height: 40vh; flex: none; }
            .topic-text { font-size: 20px; }
            .timer-display { font-size: 64px; margin: 20px 0; }
            .dock-btn { width: 60px; height: 60px; font-size: 24px; }
            .bottom-dock { bottom: 30px; padding: 15px 35px; gap: 30px; }
        }
    </style>
</head>
<body>

    <header><div class="logo"><span class="grad">C</span>areerSync <span class="grad">A</span>I</div></header>
    <div id="roomCodeDisplay">Room: ----</div>

    <div class="topic-container"><div class="topic-text" id="topicLabel">Loading AI Topic...</div></div>
    <div class="timer-display" id="mainTimer">15:00</div>
    <button id="hostStartBtn" class="start-session-btn" style="display:none;">Start Discussion</button>

    <div class="content-grid">
        <div class="box">
            <div class="box-title">Participants Joined</div>
            <div id="participantList"></div>
        </div>
        <div class="box">
            <div class="box-title">Live Transcript</div>
            <div id="transcriptBody">
                <div style="color: #898a9e; font-style: italic; font-size: 13px;" id="placeholderText">Transcript will appear here.</div>
            </div>
        </div>
    </div>

    <div class="bottom-dock">
        <button class="dock-btn mute-btn is-muted" id="toggleMic" disabled><i class="fa-solid fa-microphone-slash"></i></button>
        <button class="dock-btn hand-btn" id="raiseHandBtn" disabled><i class="fa-solid fa-hand"></i></button>
        <button class="dock-btn end-btn" id="leaveRoom"><i class="fa-solid fa-phone-slash"></i></button>
    </div>

    <div id="audio-container" style="display:none;"></div>

    <script>
        const BACKEND_URL = window.location.hostname.includes('localhost') || window.location.hostname.includes('127.0.0') ? "http://localhost:5000" : "https://careersync-backend-yo5x.onrender.com";
        const socket = io(BACKEND_URL);
        
        const roomCode = new URLSearchParams(window.location.search).get('room') || localStorage.getItem('gd_room');
        const isHost = (new URLSearchParams(window.location.search).get('host') === 'true') || (localStorage.getItem('gd_is_host') === 'true');
        
        const token = localStorage.getItem('gd_token');
        const wsUrl = localStorage.getItem('gd_ws');
        const topic = localStorage.getItem('gd_topic');
        const pName = localStorage.getItem('gd_name') || "Guest";

        document.getElementById('topicLabel').innerText = topic || "Group Discussion";
        document.getElementById('roomCodeDisplay').innerText = `Room: ${roomCode}`;
        if (isHost) document.getElementById('hostStartBtn').style.display = 'inline-block';

        let localRoom, isSessionActive = false, timerValue = 900; 
        let fullTranscriptRecord = ""; 
        let currentSpeaker = null; // Controlled by Server Baton Logic

        // --- SPEECH RECOGNITION ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true; recognition.interimResults = false; recognition.lang = "en-IN";
            recognition.onresult = (event) => {
                if(!isSessionActive || currentSpeaker !== pName) return; // Only process if you hold the baton
                const text = event.results[event.results.length - 1][0].transcript.trim();
                if (text) {
                    displayTranscript(pName, text);
                    socket.emit("gd-message", { roomCode, name: pName, text });
                }
            };
            recognition.onend = () => { if (isSessionActive && currentSpeaker === pName) { try { recognition.start(); } catch(e) {} } };
        }

        function displayTranscript(name, text) {
            fullTranscriptRecord += `${name}: ${text}\n`; 
            const tb = document.getElementById('transcriptBody');
            const placeholder = document.getElementById('placeholderText');
            if (placeholder) placeholder.remove(); 
            tb.innerHTML += `<div class="chat-msg"><span class="chat-name">${name}:</span> ${text}</div>`;
            tb.scrollTop = tb.scrollHeight; 
        }

        socket.on("gd-new-message", (data) => {
            if (data.name !== pName) displayTranscript(data.name, data.text);
        });

        // --- LIVEKIT AUDIO SYNC (CRITICAL FOR MULTI-DEVICE) ---
        async function initRoom() {
            try {
                localRoom = new LivekitClient.Room({ adaptiveStream: true, dynacast: true });
                
                localRoom.on(LivekitClient.RoomEvent.ParticipantConnected, updateParticipants);
                localRoom.on(LivekitClient.RoomEvent.ParticipantDisconnected, updateParticipants);
                localRoom.on(LivekitClient.RoomEvent.ActiveSpeakersChanged, handleSpeakers);
                
                // CRITICAL FIX: Attach incoming audio tracks to DOM so you can hear them
                localRoom.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
                    if (track.kind === 'audio') {
                        const audioElement = track.attach();
                        document.getElementById('audio-container').appendChild(audioElement);
                    }
                });

                await localRoom.connect(wsUrl, token);
                await localRoom.localParticipant.setMicrophoneEnabled(false); // Default off
                
                updateParticipants(); 
                socket.emit("join-gd-room", { roomCode, participantName: pName });
            } catch (err) { console.error("LiveKit error", err); }
        }

        function updateParticipants() {
            const list = document.getElementById('participantList');
            list.innerHTML = `<div class="participant-item"><span>${pName} (You)</span> <div class="status-tags"><span class="hand-tag" id="hand-local">✋</span><span class="speaking-tag" id="tag-local">SPEAKING</span></div></div>`;
            localRoom.remoteParticipants.forEach(p => {
                list.innerHTML += `<div class="participant-item"><span>${p.identity}</span> <div class="status-tags"><span class="hand-tag" id="hand-${p.identity}">✋</span><span class="speaking-tag" id="tag-${p.identity}">SPEAKING</span></div></div>`;
            });
        }

        // LiveKit real-time speaker visuals
        function handleSpeakers(speakers) {
            document.querySelectorAll('.speaking-tag').forEach(t => t.style.display = 'none');
            speakers.forEach(s => {
                const tagId = s.identity === localRoom.localParticipant.identity ? 'tag-local' : `tag-${s.identity}`;
                const tag = document.getElementById(tagId);
                if(tag) tag.style.display = 'inline-block';
            });
        }

        // --- THE MIC BATON & HAND RAISE SYSTEM ---
        socket.on("mic-update", (data) => {
            currentSpeaker = data.currentSpeaker;
            const queue = data.queue || [];
            const micBtn = document.getElementById('toggleMic');
            
            // Sync Hand Icons
            document.querySelectorAll('.hand-tag').forEach(t => t.style.display = 'none');
            queue.forEach(nameInQueue => {
                const isMe = nameInQueue === pName;
                const tag = document.getElementById(isMe ? 'hand-local' : `hand-${nameInQueue}`);
                if(tag) tag.style.display = 'inline-block';
            });

            // If session hasn't started, don't allow mic changes
            if (!isSessionActive) return;

            if (currentSpeaker === pName) {
                // I HAVE THE MIC
                micBtn.disabled = false;
                micBtn.classList.remove('is-muted');
                micBtn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
                localRoom.localParticipant.setMicrophoneEnabled(true);
                if (recognition) { try { recognition.start(); } catch(e) {} }
            } else if (currentSpeaker !== null) {
                // SOMEONE ELSE HAS THE MIC
                micBtn.disabled = true;
                micBtn.classList.add('is-muted');
                micBtn.innerHTML = '<i class="fa-solid fa-microphone-slash"></i>';
                localRoom.localParticipant.setMicrophoneEnabled(false);
                if (recognition) recognition.stop();
            } else {
                // MIC IS FREE - ANYONE CAN GRAB IT
                micBtn.disabled = false;
                micBtn.classList.add('is-muted');
                micBtn.innerHTML = '<i class="fa-solid fa-microphone-slash"></i>';
                localRoom.localParticipant.setMicrophoneEnabled(false);
                if (recognition) recognition.stop();
            }
        });

        socket.on("hand-queue-update", (data) => {
            const queue = data.queue || [];
            document.querySelectorAll('.hand-tag').forEach(t => t.style.display = 'none');
            queue.forEach(nameInQueue => {
                const isMe = nameInQueue === pName;
                const tag = document.getElementById(isMe ? 'hand-local' : `hand-${nameInQueue}`);
                if(tag) tag.style.display = 'inline-block';
            });
        });

        // Click Mic Button -> Sends Request to Server
        document.getElementById('toggleMic').onclick = () => {
            if (!isSessionActive) return;
            
            if (currentSpeaker === pName) {
                // I have it, I'm dropping it
                socket.emit("release-mic", { roomCode });
            } else if (currentSpeaker === null) {
                // It's free, I want it
                socket.emit("claim-mic", { roomCode, name: pName });
            }
        };

        // Raise Hand
        document.getElementById('raiseHandBtn').onclick = () => {
            if (isSessionActive && currentSpeaker !== pName) {
                socket.emit("raise-hand", { roomCode, name: pName });
            }
        };

        // --- SESSION START LOGIC ---
        function startSession() {
            isSessionActive = true;
            document.getElementById('hostStartBtn').style.display = 'none';
            document.getElementById('raiseHandBtn').disabled = false;
            document.getElementById('raiseHandBtn').classList.add('active');
            
            // Force an update to unlock the mic if it's free
            if (currentSpeaker === null) {
                document.getElementById('toggleMic').disabled = false;
            }

            setInterval(() => {
                if(timerValue <= 0) return;
                timerValue--;
                let m = Math.floor(timerValue / 60); let s = timerValue % 60;
                document.getElementById('mainTimer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            }, 1000);
        }

        document.getElementById('hostStartBtn').onclick = () => { socket.emit("start-gd", roomCode); };
        socket.on("gd-started", () => { if(!isSessionActive) startSession(); });

        // END DISCUSSION
        document.getElementById('leaveRoom').onclick = () => {
            if (localRoom) localRoom.disconnect();
            if (recognition) recognition.stop();
            localStorage.setItem("gd_final_transcript", fullTranscriptRecord);
            window.location.href = 'gd-result.html';
        };

        initRoom();
    </script>
</body>
</html>
