<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GD Room - CareerSync AI</title>
 <script src="https://careersync-backend-yo5x.onrender.com/socket.io/socket.io.js"></script>

  <style>
    body { margin:0; background:#0f172a; color:white; font-family:Arial, sans-serif; min-height:100vh; display:flex; flex-direction:column; }
    .timer-bar { padding:12px 20px; background:#111827; display:flex; justify-content:center; align-items:center; gap:20px; border-bottom:1px solid #334155; }
    #timer { font-size:22px; color:#22d3ee; font-weight:bold; min-width:80px; }
    button { padding:8px 16px; border:none; border-radius:8px; background:#22d3ee; color:#0f172a; font-weight:600; cursor:pointer; transition:0.2s; }
    button:hover { background:#67e8f9; }
    .end-btn { background:#ef4444; color:white; }
    .end-btn:hover { background:#f87171; }
    .topic-bar { background:#1e293b; padding:16px; font-size:18px; font-weight:600; text-align:center; border-bottom:1px solid #334155; }
    .member-count { margin:20px auto; font-size:18px; font-weight:bold; color:#67e8f9; text-align:center; }
    .members-container { flex:1; display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:24px; padding:30px; max-width:1200px; margin:0 auto; align-content:start; }
    .member-box { background:#1e293b; border-radius:16px; padding:20px; text-align:center; border:2px solid transparent; transition:all 0.25s; min-height:140px; display:flex; flex-direction:column; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,0.3); }
    .member-box.you { border-color:#60a5fa; background:#1e40af22; }
    .member-box.speaking { border:3px solid #22d3ee; box-shadow:0 0 20px rgba(34,211,238,0.5); transform:scale(1.04); }
    .member-name { font-size:17px; font-weight:600; margin-bottom:8px; }
    .member-status { font-size:14px; opacity:0.9; }
    .you-label { font-size:13px; color:#60a5fa; margin-top:6px; font-weight:500; }
    @media (max-width:600px) { .members-container { grid-template-columns:1fr; padding:20px; } }
  </style>
</head>
<body>

  <div class="timer-bar">
    <span id="timer">00:00</span>
    <button onclick="startTimer()">Start Timer</button>
    <button class="end-btn" onclick="endSession()">End Session</button>
  </div>

  <div class="topic-bar" id="topic">Topic loading...</div>

  <div class="member-count" id="memberCount">Members: 0 / 4</div>

  <div id="members" class="members-container"></div>

  <script>
    const socket = io("https://careersync-backend-yo5x.onrender.com");

    const params = new URLSearchParams(window.location.search);
    const room = params.get("room");
    const myEmail = params.get("email");

    if (!room || !myEmail) {
      alert("Missing room or email");
      window.location.href = "/";
    }

    socket.emit("join-room", { roomCode: room, email: myEmail });

    let seconds = 0;
    let timerInterval = null;

    function startTimer() {
      if (timerInterval) return;
      timerInterval = setInterval(() => {
        seconds++;
        const m = String(Math.floor(seconds / 60)).padStart(2, "0");
        const s = String(seconds % 60).padStart(2, "0");
        document.getElementById("timer").textContent = `${m}:${s}`;
      }, 1000);
    }

    function endSession() {
      if (confirm("End the session?")) {
        if (timerInterval) clearInterval(timerInterval);
        socket.disconnect();
        window.location.href = "/";
      }
    }

    socket.on("roomData", (roomData) => {
      document.getElementById("topic").textContent = `Topic: ${roomData.topic || "Not set"}`;
      const count = roomData.members?.length || 0;
      document.getElementById("memberCount").textContent = `Members: ${count} / 4`;

      const container = document.getElementById("members");
      container.innerHTML = "";

      (roomData.members || []).forEach(member => {
        const isMe = member.email === myEmail;
        const box = document.createElement("div");
        box.className = `member-box ${isMe ? "you" : ""} ${member.isSpeaking ? "speaking" : ""}`;
        const name = member.email.split("@")[0];
        box.innerHTML = `
          <div class="member-name">${name}${isMe ? " (You)" : ""}</div>
          <div class="member-status">${member.isSpeaking ? "🗣️ Speaking" : "👂 Listening"}</div>
          ${isMe ? '<div class="you-label">This is you</div>' : ""}
        `;
        container.appendChild(box);
      });
    });

    // Speaking (hold mouse or spacebar)
    document.addEventListener("mousedown", () => socket.emit("start-speaking", { roomCode: room, email: myEmail }));
    document.addEventListener("mouseup",   () => socket.emit("stop-speaking",  { roomCode: room, email: myEmail }));

    document.addEventListener("keydown", e => {
      if (e.code === "Space" && !e.repeat) {
        e.preventDefault();
        socket.emit("start-speaking", { roomCode: room, email: myEmail });
      }
    });
    document.addEventListener("keyup", e => {
      if (e.code === "Space") socket.emit("stop-speaking", { roomCode: room, email: myEmail });
    });

    socket.on("gd-ended", () => {
      alert("Group Discussion ended by server!");
      endSession();
    });
  </script>
</body>
</html>
